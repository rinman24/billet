# billet configuration — copy to ~/.config/billet/config.toml and edit.
#
#   mkdir -p ~/.config/billet && cp config.example.toml ~/.config/billet/config.toml
#
# billet is stateless: this file is the only operator-authored state. Power state,
# public IP, and the host<->workspace mapping are derived live from Azure + resource
# tags, never cached here. Resolution order for the config path:
#   1. the --config PATH global option
#   2. the BILLET_CONFIG environment variable
#   3. $XDG_CONFIG_HOME/billet/config.toml  (default ~/.config/billet/config.toml)
#
# Nothing here is a secret. A subscription id is an identifier, not a credential —
# Azure access is gated by `az login`. Do not put PATs or passwords in this file.

# ---------------------------------------------------------------------------------
# [billet] — global settings
# ---------------------------------------------------------------------------------
[billet]
# The Azure subscription billet pins (`az account set --subscription`) before any az
# operation, so runs are deterministic regardless of your ambient CLI default.
subscription_id = "00000000-0000-0000-0000-000000000000"
# Optional. The host used when a `billet host …` command omits --host. If unset and
# more than one host is defined, --host is required.
default_host = "devbox"
# Optional. Your personal in-container bootstrap, run in every Workspace's service
# container right after the devcontainer's postCreateCommand at `billet start` time
# (e.g. clone + install your dotfiles). Empty (the default) disables it.
# personal_bootstrap_cmd = "git clone https://github.com/me/dotfiles ~/dotfiles && bash ~/dotfiles/install.sh"

# ---------------------------------------------------------------------------------
# [hosts.<key>] — one table per cloud Host (a VM). The table key (here "devbox") is
# the logical host name you pass to `--host`; it need not equal the Azure vm_name.
# ---------------------------------------------------------------------------------
[hosts.devbox]
# --- Azure placement (required) ---
resource_group = "gswa-devbox-rg"
# Optional; defaults to the table key. The live devbox VM is named "gswa-devbox".
vm_name        = "gswa-devbox"
location       = "westus3"
admin_user     = "azureuser"

# --- VM shape (required for cold create; ignored on resume/stop of an existing VM) ---
vm_image       = "Canonical:0001-com-ubuntu-server-jammy:22_04-lts-gen2:latest"
vm_size        = "Standard_D4s_v4"
public_ip_sku  = "Standard"
os_disk_gb     = 64
storage_sku    = "Premium_LRS"

# --- Inbound SSH NSG rule (optional) ---
# nsg_name defaults to "<vm_name>NSG" (the name `az vm create` derives).
nsg_name       = "gswa-devboxNSG"
ssh_rule_name  = "default-allow-ssh"

# --- Topology (optional) ---
# Whether this host runs Workspaces. The fleet-host (slice 7) sets this false: billet
# manages its VM lifecycle but registers no Workspaces on it.
manages_workspaces = true

# --- Supply-chain pins (optional; Docker defaults shown) ---
# Used on the cold path to install Docker from its signed apt repo (level-B provenance).
docker_gpg_url = "https://download.docker.com/linux/ubuntu/gpg"
docker_apt_url = "https://download.docker.com/linux/ubuntu"

# ---------------------------------------------------------------------------------
# A SECOND Host that billet does NOT run Workspaces on — the fleet-host (slice 7).
#
# billet manages this VM's lifecycle exactly like any other Host
#   billet host up|stop|pin-ip --host fleet
# but it carries no [workspaces.*]. Its runtime (an AFK fleet, in gswa's case) is owned
# elsewhere; billet only brings the box up/down. `manages_workspaces = false` makes that
# explicit and is ENFORCED: the workspace verbs (add/start/stop/connect/ssh-config) refuse
# a Host with manages_workspaces=false, and `billet ls` flags any Workspace wrongly placed
# on one as INVALID (see ADR-0004). Do not define [workspaces.*] with host = "fleet".
# ---------------------------------------------------------------------------------
# [hosts.fleet]
# resource_group     = "GSWA-FLEET-HOST-RG"
# vm_name            = "gswa-fleet-host"
# location           = "westus3"
# admin_user         = "azureuser"
# vm_image           = "Canonical:0001-com-ubuntu-server-jammy:22_04-lts-gen2:latest"
# vm_size            = "Standard_D4s_v5"
# public_ip_sku      = "Standard"
# os_disk_gb         = 64
# storage_sku        = "Premium_LRS"
# manages_workspaces = false

# ---------------------------------------------------------------------------------
# [workspaces.<key>] — one table per repo devcontainer running on a Host.
#
# This table holds only billet's *operator intent* for a Workspace. The repo's container
# facts — the compose service, compose file(s), workspace folder, in-container ssh user
# (`remoteUser`), and the `postCreateCommand` bootstrap — are NOT declared here: billet
# reads them live from the repo's own `.devcontainer/devcontainer.json` on the host (a
# read-only data contract; see ADR-0002). One source of truth, and each repo evolves its
# container without re-editing billet's config.
# ---------------------------------------------------------------------------------
[workspaces.gswa-backend]
host               = "devbox"                                  # which [hosts.<key>] runs it
repo_url           = "git@github.com:genshift/gswa-backend.git"
repo_dir           = "gswa-backend"                            # dir on the host (relative to $HOME)
container_ssh_port = 2222                                      # distinct loopback port per workspace
tmux_session       = "main"                                    # tmux session `connect` attaches
host_alias         = "gswa-devbox"                             # preserved ssh-config aliases
container_alias    = "gswa-container"
# Optional Claude agent-teams flag written into the repo's .claude/settings.local.json
# on the host at start time. Empty to skip.
agent_teams_flag   = "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS"
# Optional host-side bootstrap hook, run in repo_dir before `compose up` (e.g. generate
# .env). Defaults to a no-op (":"). The in-container bootstrap is the devcontainer's own
# `postCreateCommand` (gswa's is `bash .devcontainer/postcreate.sh`, declared there).
host_bootstrap_cmd = ":"
# What `billet start --verify` runs inside the container after a cold bootstrap.
verify_cmd         = "make test"
# Optional. Hex brand color ("#RGB" or "#RRGGBB") for this Workspace's tmux status bar on
# `billet connect`, so you can tell containers apart at a glance. billet auto-picks a legible
# text color and always shows the workspace key on the bar. Omit to keep tmux's default.
status_color       = "#C05CE0"

# ---------------------------------------------------------------------------------
# A SECOND Workspace on the SAME Host — the multi-repo case (slice 6).
#
# Two rules make two containers coexist on one VM:
#   1. A distinct `container_ssh_port` (uniqueness is validated per-host by `billet add`).
#   2. This repo's compose must bind sshd to billet's assigned port, not a hardcoded one.
#      billet exports BILLET_CONTAINER_SSH_PORT before every `docker compose`, so the repo's
#      compose should publish (see ADR-0003):
#          ports:
#            - "127.0.0.1:${BILLET_CONTAINER_SSH_PORT:-2222}:22"
#      The `:-2222` default keeps a repo that has not adopted the variable working unchanged;
#      only the second repo onward must parameterize its port.
#
# `billet ssh-config` then renders both containers behind the one Host (ProxyJump), each with
# its own port and a collision-free HostKeyAlias — and the Host still needs only one NSG rule.
# ---------------------------------------------------------------------------------
# [workspaces.other-repo]
# host               = "devbox"                                  # the SAME shared host
# repo_url           = "git@github.com:my-org/other-repo.git"
# repo_dir           = "other-repo"
# container_ssh_port = 2223                                      # distinct from gswa-backend's 2222
# tmux_session       = "main"
# host_alias         = "gswa-devbox"                             # same host alias (one VM)
# container_alias    = "other-container"                         # distinct container alias
# host_bootstrap_cmd = ":"
# verify_cmd         = "make test"
# status_color       = "#5C9CE0"                                 # optional; a distinct hue tells it apart
