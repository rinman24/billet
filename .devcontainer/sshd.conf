# billet in-container sshd hardening — mirrors gswa's sshd_gswa.conf.
#
# Baked into the image at /etc/ssh/sshd_config.d/billet.conf (Debian's stock
# sshd_config Includes that directory). Key-only: the container's sshd is reachable
# ONLY from the VM loopback (compose publishes
# 127.0.0.1:${BILLET_CONTAINER_SSH_PORT:-2222}:22), and the Mac reaches it via ProxyJump
# through the VM host.

Port 22

# Key-only, non-root, dev-only. No passwords, no root login; the only trusted key is the
# operator's key in dev's authorized_keys (bind-mounted from the VM, read-only).
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
AllowUsers dev

# Forward the Mac's ssh-agent through so agent-forwarded git works inside the container.
AllowAgentForwarding yes

# Persisted host keys live on a named volume; dev-entrypoint.sh generates them on first
# boot if absent. Naming them explicitly makes these the only identities sshd offers.
HostKey /etc/ssh/host_keys/ssh_host_ed25519_key
HostKey /etc/ssh/host_keys/ssh_host_rsa_key
