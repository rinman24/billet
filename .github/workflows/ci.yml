# billet CI — lint + strict type-check + import contract + tests on every PR into main.
#
# Fully self-contained: no secrets, no services. uv provisions Python 3.11 (per
# .python-version) and the dev tools from the locked uv.lock.
name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  ci:
    name: Lint + Typecheck + Imports + Test (uv)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: uv sync (locked deps + project)
        shell: bash
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Ruff (lint)
        shell: bash
        run: |
          set -euo pipefail
          uv run ruff check .

      - name: Ruff (format)
        shell: bash
        run: |
          set -euo pipefail
          uv run ruff format --check .

      - name: Pyright (strict)
        shell: bash
        run: |
          set -euo pipefail
          uv run pyright

      - name: Pyright pin matches uv.lock
        shell: bash
        run: bash scripts/check-pyright-pin.sh --dockerfile .devcontainer/Dockerfile

      - name: import-linter (layer contract)
        shell: bash
        run: |
          set -euo pipefail
          uv run lint-imports

      - name: Pytest
        shell: bash
        run: |
          set -euo pipefail
          uv run pytest --cov=billet --cov-report=term-missing
